<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestLog - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            text-align: center;
        }

        .logo-icon {
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="card-custom login-card fade-in">
        <i class="fa-solid fa-user-plus logo-icon"></i>
        <h2 class="mb-4">Create Hero</h2>
        <p class="text-secondary mb-4">Join the realm and start your quest log.</p>

        <div id="registerAlert" class="alert d-none" role="alert">
        </div>

        <form id="registerForm">
            <div class="mb-3 text-start">
                <label for="regUsername" class="form-label text-secondary">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-secondary"><i
                            class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control form-control-custom" id="regUsername" required
                        placeholder="Choose a username">
                </div>
            </div>
            <div class="mb-4 text-start">
                <label for="regPassword" class="form-label text-secondary">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-secondary"><i
                            class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control form-control-custom" id="regPassword" required
                        placeholder="Create a password">
                </div>
            </div>
            <button type="submit" class="btn btn-accent w-100 py-2 mb-3">Join Realm <i
                    class="fa-solid fa-user-plus ms-2"></i></button>
            <p class="text-secondary mt-3 mb-0">Already a hero? <a href="login.html"
                    class="text-accent text-decoration-none">Enter Realm</a></p>
        </form>
    </div>

    <!-- JS Autentikasi -->
    <script src="assets/js/auth.js?v=2"></script>
</body>

</html>
